<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height:900px;
        }
        .sticky {
            padding: 20px;
            background-color: aqua;
            position: sticky;
            top: 20px;
        }
        .fixed{
            background-color: aquamarine;
            border: 100px;
            position: fixed;
            margin: 70px;
            width: 70px;
        }
        .static{
            height: 100px;
            width: 500px;
            background-color: blueviolet;
        }
        .relative{
            height: 100px;
            width: 100px;
            background-color: brown;
            position: relative;
        }
        .absolute{
            height: 50px;
            width: 100px;
            background-color: burlywood;
            position: absolute;
        }

        </style>
</head>

<body>
    <h1> Css Position Properties</h1>
    <div class="sticky">sticky </div> <br>
    <div class="fixed"> fixed</div> <br>
     <div class="static"> static</div> <br>
      <div class="relative"> relative</div> <br>
       <div class="absolute"> absolute</div>




</body>
</html>
