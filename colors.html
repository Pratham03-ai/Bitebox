<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            margin: 10px;
        }
        .c1{
            /* display: none; */
            background-color: yellowgreen;
            visibility: hidden;

        }
        .c2{
            background-color: #f08080;
        }
        .c3{
            background-color: rgb(255, 0, 255);

        }
        .c4{
            background-color: rgba(255,124,236,1);

        }
        .c5{
            background-color: hsl(253, 100%, 85%);

        }
        .c6{
            background: linear-gradient(180deg, red, yellow );

        }
        .c7{ 
            background: radial-gradient(yellow 25% , red 50%, black 75%);

        }




    </style>
</head>
<body>
<div class="c1"></div>
<div class="c2"></div>
<div class="c3"></div>
<div class="c4"></div>
<div class="c5"></div>
<div class="c6"></div>
<div class="c7"></div>
</body>
</html>
